<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmácia Tools — A autenticar...</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #F4F4F0; }
    .box { text-align: center; padding: 40px; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .logo { font-size: 32px; margin-bottom: 16px; }
    h2 { color: #0B5E47; margin: 0 0 8px; font-size: 18px; }
    p { color: #6B6B65; font-size: 14px; margin: 0; }
    .spinner { width: 32px; height: 32px; border: 3px solid #E8E8E4; border-top-color: #0B5E47; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 16px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #8B1A1A; background: #FFF0F0; padding: 12px; border-radius: 8px; margin-top: 16px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">💊</div>
    <h2>Farmácias Connect</h2>
    <div class="spinner"></div>
    <p id="msg">A processar autenticação...</p>
    <div id="error" class="error" style="display:none"></div>
  </div>

  <script>
    function processCallback() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const token = params.get("access_token");
      const error = params.get("error");

      if (error) {
        document.getElementById("msg").textContent = "Erro de autenticação";
        document.getElementById("error").style.display = "block";
        document.getElementById("error").textContent = error;
        return;
      }

      if (token) {
        sessionStorage.setItem("zoho_access_token", token);
        const redirect = sessionStorage.getItem("zoho_redirect") || "/farmacia-tools/index.html";
        sessionStorage.removeItem("zoho_redirect");
        document.getElementById("msg").textContent = "Autenticado! A redirecionar...";
        setTimeout(() => { window.location.href = redirect; }, 800);
      } else {
        document.getElementById("msg").textContent = "Token não encontrado";
        document.getElementById("error").style.display = "block";
        document.getElementById("error").textContent = "Não foi possível obter o token de acesso.";
      }
    }

    processCallback();
  </script>
</body>
</html>
